name: Beauty Index Analysis

on:
  repository_dispatch:
    types: [start-analysis]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          ANALYSIS_NAME: ${{ github.event.client_payload.name }}
          ANALYSIS_CATEGORY: ${{ github.event.client_payload.category }}
        run: |
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8
          python generate_article.py > action_output.txt 2>&1

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add beauty_index.db action_output.txt
          git commit -m "Update ranking database: ${{ github.event.client_payload.name }}" || echo "No changes to commit"
          git push
