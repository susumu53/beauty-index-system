name: 芸能人自動投稿 (Seesaa - namasoku)

on:
  schedule:
    # JST: 9時・15時・21時・翌3時 = UTC: 0時・6時・12時・18時
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:   # 手動実行用

jobs:
  post_celebrity_article:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # posted_log.json のコミットに必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 python-dotenv

      - name: Run celebrity auto-post script
        env:
          SEESAA_CELEB_EMAIL: ${{ secrets.SEESAA_CELEB_EMAIL }}
          SEESAA_CELEB_PASSWORD: ${{ secrets.SEESAA_CELEB_PASSWORD }}
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID_CELEB: ${{ secrets.DMM_AFFILIATE_ID_SEESAA }}
        run: |
          cd celebrity_autopost
          python main.py

      - name: Commit posted_log.json to prevent duplicates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add celebrity_autopost/posted_log.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: update celebrity posted log [skip ci]" && git push)
