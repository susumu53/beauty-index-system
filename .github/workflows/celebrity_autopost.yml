name: Celebrity Autopost (6 posts per day)

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'  # UTC 0,4,8,12,16,20 → JST 9,13,17,21,1,5
  workflow_dispatch:
    inputs:
      manual_run:
        description: 'Run all generators manually (for testing)'
        required: false
        default: 'false'

jobs:
  autopost:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run autopost script
        env:
          SEESAA_CELEB_EMAIL: ${{ secrets.SEESAA_CELEB_EMAIL }}
          SEESAA_CELEB_PASSWORD: ${{ secrets.SEESAA_CELEB_PASSWORD }}
          DMM_AFFILIATE_ID_CELEB: ${{ secrets.DMM_AFFILIATE_ID_CELEB }}
        run: |
          $env:PYTHONIOENCODING="utf-8"
          python main.py
