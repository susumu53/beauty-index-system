name: FC2 FANZA Auto Post

on:
  schedule:
    # 毎時0分に実行し、時間ごとに異なるフェチカテゴリを自動投稿する
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: '検索キーワード（手動で特定のフェチをすぐ投稿したい場合）'
        required: false
        default: ''

jobs:
  post-ranking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv
          
      - name: Run Auto Post Script
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          FC2_USERNAME: ${{ secrets.FC2_USERNAME }}
          FC2_PASSWORD: ${{ secrets.FC2_PASSWORD }}
          FC2_BLOG_ID: ${{ secrets.FC2_BLOG_ID }}
        run: |
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            # 手動実行でキーワードがある場合
            python generate_dmm_ranking.py --hits 10 --keyword "${{ github.event.inputs.keyword }}"
          else
            # 定期実行：毎時違うフェチを時間差で自動投稿
            python generate_dmm_ranking.py --hits 10
          fi
