name: Seesaa Blog DMM Hourly AutoPost

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless mediapipe numpy matplotlib requests python-dotenv japanize-matplotlib

      - name: Run AutoPost
        env:
          SEESAA_EMAIL: ${{ secrets.SEESAA_EMAIL }}
          SEESAA_PASSWORD: ${{ secrets.SEESAA_PASSWORD }}
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID_SEESAA: ${{ secrets.DMM_AFFILIATE_ID_SEESAA }}
        run: |
          cd seesaa_autopost
          python main.py
